name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.1'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate plugin files
        run: npm test

      - name: Verify release version metadata
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));

          const errors = [];
          if (manifest.version !== version) errors.push(`manifest.json version ${manifest.version} does not match ${version}`);
          if (pkg.version !== version) errors.push(`package.json version ${pkg.version} does not match ${version}`);
          if (!versions[version]) errors.push(`versions.json does not contain ${version}`);
          if (errors.length) {
            console.error(errors.join('\n'));
            process.exit(1);
          }
          NODE

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          gh release create "$VERSION" main.js manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$VERSION" \
            --notes "Release $VERSION."

      - name: Attest main.js provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js
